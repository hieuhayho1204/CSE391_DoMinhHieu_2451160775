PHẦN B: THỤC HÀNH CODE

```html
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trang giới thiệu sản phẩm</title>
</head>
<body>

    <h1>Giới thiệu sản phẩm</h1>

    <!-- SVG logo -->
    <h2>Logo</h2>
    <svg width="120" height="120">
        <circle cx="60" cy="60" r="50" fill="blue" />
        <text x="50%" y="55%" text-anchor="middle" fill="white" font-size="20">
            LOGO
        </text>
    </svg>

    <!-- Ảnh sản phẩm -->
    <h2>Sản phẩm</h2>

    <figure>
        <img src="https://via.placeholder.com/300"
             alt="Sản phẩm 1 - điện thoại thông minh"
             loading="lazy"
             style="max-width: 100%; height: auto;">
        <figcaption>Điện thoại thông minh cao cấp</figcaption>
    </figure>

    <figure>
        <img src="https://via.placeholder.com/300"
             alt="Sản phẩm 2 - tai nghe không dây"
             loading="lazy"
             style="max-width: 100%; height: auto;">
        <figcaption>Tai nghe không dây chất lượng cao</figcaption>
    </figure>

    <figure>
        <img src="https://via.placeholder.com/300"
             alt="Sản phẩm 3 - đồng hồ thông minh"
             loading="lazy"
             style="max-width: 100%; height: auto;">
        <figcaption>Đồng hồ thông minh hiện đại</figcaption>
    </figure>

    <!-- Video YouTube -->
    <h2>Video giới thiệu (YouTube)</h2>
    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/tgbNymZ7vqY"
        title="YouTube video"
        frameborder="0"
        allowfullscreen>
    </iframe>

    <!-- Video local -->
    <h2>Video sản phẩm</h2>
    <video controls poster="https://via.placeholder.com/500">
        <source src="video.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
        Trình duyệt không hỗ trợ video.
    </video>

    <!-- Audio -->
    <h2>Nhạc nền</h2>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ audio.
    </audio>

</body>
</html>
```
